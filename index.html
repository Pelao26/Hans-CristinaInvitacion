<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hans & Cristina - Nuestra Boda</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <ul>
            <li><a href="#home">HOME</a></li>
            <li><a href="#story">HISTORIA</a></li>
            <li><a href="#rsvp">RSVP</a></li>
            <li><a href="#faq">FAQ</a></li>
        </ul>
    </nav>

    <header id="home" class="hero">
        <div class="hero-content">
            <p>THE WEDDING OF</p>
            <h1>Hans & Cristina</h1>
            <p class="date">05 DE JUNIO, 2026</p>
        </div>
    </header>

    <section id="story" class="welcome">
        <div class="container">
            <h2>Bienvenidos</h2>
            <p>Estamos felices de compartir este día tan especial con ustedes...</p>
            <div class="flowers"></div>
        </div>
    </section>

    <section class="countdown-section">
        <h3>Nuestro para siempre comienza en:</h3>
        <div id="timer">
            <span>000 : 00 : 00 : 00</span>
        </div>
    </section>

    <section id="rsvp" class="rsvp-section">
        <div class="envelope">
            <img src="https://via.placeholder.com/150" alt="Sello de cera">
            <h2>RSVP</h2>
            <p>Por favor, confirma tu asistencia antes del 1 de mayo.</p>
            <button class="btn">CONFIRMAR AQUÍ</button>
        </div>
    </section>

</body>
</html>
