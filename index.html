<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hans & Cristina - 05.06.26</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;700&family=Patrick+Hand&family=Quicksand:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F4F1ED; /* El beige de fondo */
            --dark-green: #2d3428;
            --olive-green: #C5D1B7; /* Color del sobre */
            --wax-gold: #C6AA6F; /* Color del sello de cera */
            --text-gold: #a68b5b;
            --text-dark: #3e3e3e;
            --quicksand: 'Quicksand', sans-serif;
            --cursive: 'Great Vibes', cursive;
            --handwritten: 'Patrick Hand', cursive;
            --montserrat: 'Montserrat', sans-serif;
        }

        body {
            margin: 0;
            font-family: var(--montserrat);
            background-color: var(--bg-color);
            color: var(--text-dark);
            scroll-behavior: smooth;
        }

        h2.cursive { font-family: var(--cursive); font-size: 3rem; }
        h2.handwritten { font-family: var(--handwritten); font-size: 2.5rem; }

        /* Navegación */
        .navbar {
            position: fixed;
            width: 100%;
            background: rgba(244, 241, 237, 0.95);
            padding: 15px 0;
            text-align: center;
            z-index: 1000;
        }
        .navbar a {
            text-decoration: none;
            color: var(--dark-green);
            margin: 0 15px;
            font-size: 0.75rem;
            letter-spacing: 2px;
            font-weight: bold;
        }

        /* Hero */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&q=80&w=2070') center/cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
        .hero h1 { font-size: clamp(3rem, 10vw, 5rem); margin: 0; font-family: var(--cursive); }
        .hero p { letter-spacing: 5px; font-size: 1.2rem; }

        /* RSVP Section (INTEGRADA JUSTO DESPUÉS) */
        .rsvp-envelope-section {
            padding: 100px 20px;
            background-color: var(--bg-color);
            position: relative;
            text-align: center;
            overflow: hidden; /* Para las enredaderas */
        }

        /* Enredaderas colgantes */
        .vines-top-left {
            position: absolute;
            top: 0;
            left: 0;
            width: 400px;
            height: 400px;
            background-image: url('https://i.ibb.co/377W9xH/vines-top-left.png'); /* Debes subir esta imagen o usar una similar */
            background-repeat: no-repeat;
            background-size: contain;
            opacity: 0.7;
            z-index: 1;
        }

        .envelope-container {
            position: relative;
            z-index: 2;
            width: 500px;
            margin: 0 auto;
        }

        /* El sobre */
        .envelope {
            position: relative;
            width: 100%;
            height: 600px;
            background-color: var(--olive-green);
            background-image: url('https://www.transparenttextures.com/patterns/linen.png'); /* Textura de lino */
            border-radius: 5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* Solapa abierta */
        .envelope::before {
            content: '';
            position: absolute;
            top: -250px;
            left: 0;
            width: 0;
            height: 0;
            border-left: 250px solid transparent;
            border-right: 250px solid transparent;
            border-bottom: 250px solid var(--olive-green);
            border-bottom-image: url('https://www.transparenttextures.com/patterns/linen.png'); /* Textura en la solapa */
            z-index: 1;
        }

        /* Doily y Carta */
        .envelope-content {
            position: absolute;
            top: -180px;
            left: 50%;
            transform: translateX(-50%);
            width: 450px;
            height: 450px;
            z-index: 2;
            text-align: center;
        }

        .doily {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://i.ibb.co/L519V3B/heart-doily.png'); /* Imagen del doily de corazón */
            background-size: contain;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: var(--cursive);
            color: #333;
        }

        .doily .kindly-respond {
            font-size: 3rem;
            margin: 0;
        }

        .doily .rsvp-date {
            font-family: var(--quicksand);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        /* Sello de Cera y Botón */
        .wax-seal-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            text-align: center;
        }

        .wax-seal {
            width: 90px;
            height: 90px;
            background-color: var(--wax-gold);
            background-image: url('https://i.ibb.co/L9569Wj/wax-seal-floral.png'); /* Imagen del sello floral */
            background-size: 80%;
            background-position: center;
            background-repeat: no-repeat;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            margin: 0 auto 15px auto;
        }

        .rsvp-button {
            display: inline-block;
            border: 1px solid var(--border-color);
            padding: 10px 30px;
            text-decoration: none;
            color: var(--dark-green);
            font-family: var(--quicksand);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
        }
        .rsvp-button:hover { background: #E5DFC8; }

        @media (max-width: 768px) {
            .rsvp-envelope-section { padding-top: 200px; }
            .vines-top-left { width: 200px; height: 200px; }
            .envelope-container { width: 90%; }
            .envelope { height: 500px; }
            .envelope-content { top: -140px; width: 100%; height: auto; }
            .doily { position: relative; background-size: cover; height: 350px; }
            .doily .kindly-respond { font-size: 2.2rem; }
            .wax-seal-container { bottom: 10px; }
            .wax-seal { width: 60px; height: 60px; }
        }

        /* Resto de secciones */
        section { padding: 80px 20px; max-width: 1000px; margin: 0 auto; text-align: center; }

        /* ... (Otras secciones de código permanecen igual) ... */
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="#home">HOME</a>
        <a href="#rsvp">RSVP</a>
        <a href="#schedule">ITINERARIO</a>
        <a href="#stay">ALOJAMIENTO</a>
        <a href="#gifts">REGALOS</a>
    </nav>

    <header id="home" class="hero">
        <p>THE WEDDING OF</p>
        <h1>Hans & Cristina</h1>
        <p>05 . 06 . 2026</p>
    </header>

    <section id="rsvp" class="rsvp-envelope-section">
        <div class="vines-top-left"></div>
        <div class="envelope-container">
            <div class="envelope">
                <div class="envelope-content">
                    <div class="doily">
                        <p class="kindly-respond">Kindly Respond</p>
                        <p class="rsvp-date">By January 14th, 2027</p>
                        </div>
                </div>
                <div class="wax-seal-container">
                    <div class="wax-seal"></div>
                    <a href="#" class="rsvp-button">RSVP</a>
                </div>
            </div>
        </div>
    </section>

    <section id="schedule">
        <p class="handwritten" style="font-size: 1.5rem; margin-bottom: 0;">Our wedding day</p>
        <h2 style="font-size: 2.5rem; letter-spacing: 3px; margin-top: 0; font-family: 'Montserrat', sans-serif;">SCHEDULE</h2>
        </section>

    <footer style="padding: 60px; text-align: center; background: #eee;">
        <p class="cursive" style="font-size: 2rem; margin: 0;">Hans & Cristina</p>
        <p style="font-size: 0.7rem; letter-spacing: 2px;">GRACIAS POR ACOMPAÑARNOS</p>
    </footer>

</body>
</html>
