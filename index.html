        body { 
            margin: 0; 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--crema);

            text-align: center;
        }

        /* Portada */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),

            font-family: 'Great Vibes', cursive; 
            font-size: clamp(3.5rem, 10vw, 6rem);

            text-shadow: 2px 2px 15px rgba(0,0,0,0.5);
        }

        .hero p { font-weight: 200; letter-spacing: 5px; text-transform: uppercase; font-size: 0.9rem; }

        /* Contador */
        .countdown-section { padding: 60px 20px; background: white; }

            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
        }

            background: var(--crema);
            padding: 15px;
            border-radius: 12px;
            min-width: 75px;
            border: 1px solid #f0e6d2;

            display: block;

            color: var(--oro); 
            font-weight: bold; 
        }
